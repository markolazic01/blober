[profile.default]
solc_version = "0.8.35"
src = "src"
out = "out"
libs = []
evm_version = "osaka"
via_ir = true
optimizer = true

# Reuse the parent project's source and forge-std so we don't duplicate dependencies.
remappings = [
    "forge-std/=../lib/forge-std/src/",
    "blob-verifier/=../src/",
]
# Solc needs to be told the parent project's directories are readable, since
# they live above the benchmarks/ root.
allow_paths = ["../"]

# Read fixtures + write benchmark output CSV.
fs_permissions = [{ access = "read-write", path = "./data" }]
