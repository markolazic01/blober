[profile.default]
solc_version = "0.8.35"
src = "src"
out = "out"
libs = ["lib"]
evm_version = "osaka"
via_ir = true
optimizer = true
optimizer_runs = 99999
fs_permissions = [{ access = "read", path = "./test/fixtures" }]

[profile.benchmark]
src = "benchmarks/src"
test = "benchmarks/test"
fs_permissions = [{ access = "read-write", path = "benchmarks/data" }]
# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
